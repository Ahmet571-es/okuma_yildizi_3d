services:
  - type: web
    name: yildiz-ulkesi-v3
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
